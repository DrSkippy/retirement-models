<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Retirement Model{% endblock %}</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f0f4f8;
      --card:    #ffffff;
      --navy:    #1e3a5f;
      --navy-lt: #2a5080;
      --emerald: #059669;
      --red:     #dc2626;
      --blue:    #3b82f6;
      --amber:   #f59e0b;
      --violet:  #7c3aed;
      --text:    #0f172a;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --shadow:  0 1px 4px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.10);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--navy);
      color: #fff;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.20);
    }
    nav .brand {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      color: #fff;
      text-decoration: none;
      white-space: nowrap;
    }
    nav .run-label {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.55);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }
    nav .spacer { flex: 1; }
    nav a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    nav a:hover { background: rgba(255,255,255,0.12); color: #fff; }
    nav a.active { background: rgba(255,255,255,0.18); color: #fff; font-weight: 600; }

    /* ── Page wrapper ── */
    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }

    /* ── Page header ── */
    .page-header {
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 0.4rem;
    }
    .page-header .subtitle {
      color: var(--muted);
      font-size: 0.88rem;
    }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .badge-blue    { background: #dbeafe; color: #1d4ed8; }
    .badge-green   { background: #d1fae5; color: #065f46; }
    .badge-emerald { background: #d1fae5; color: #047857; }
    .badge-amber   { background: #fef3c7; color: #92400e; }
    .badge-red     { background: #fee2e2; color: #991b1b; }
    .badge-muted   { background: #f1f5f9; color: var(--muted); }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    /* ── Metric cards ── */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .metric-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 1.25rem 1.5rem;
      border-left: 4px solid var(--blue);
    }
    .metric-card.positive { border-left-color: var(--emerald); }
    .metric-card.negative { border-left-color: var(--red); }
    .metric-card.amber    { border-left-color: var(--amber); }
    .metric-card.navy     { border-left-color: var(--navy); }
    .metric-card .label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .metric-card .value {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .metric-card .sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    /* ── Chart grids ── */
    .chart-grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .chart-grid-2x3 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .chart-grid-1col {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .chart-card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 1rem;
      overflow: hidden;
    }
    .chart-card h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }

    /* ── Section header ── */
    .section-header {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--navy);
      margin: 2rem 0 1rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid var(--border);
    }

    /* ── Nav pills ── */
    .nav-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .nav-pills a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      background: var(--navy);
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .nav-pills a:hover { background: var(--navy-lt); }
    .nav-pills a .arrow { font-size: 0.9em; }

    /* ── Table ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }
    .data-table th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      background: #f8fafc;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 0.55rem 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:nth-child(even) td { background: #fafbfc; }
    .data-table .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .data-table .pos { color: var(--emerald); }
    .data-table .neg { color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .chart-grid-2x2, .chart-grid-2x3 { grid-template-columns: 1fr; }
      .metric-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav>
    <a class="brand" href="index.html">&#x1F4C8; Retirement Model</a>
    <span class="run-label">{{ run_name }}</span>
    <div class="spacer"></div>
    {% block nav_links %}{% endblock %}
  </nav>

  <div class="page">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
